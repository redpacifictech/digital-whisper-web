<title>Digital Whisper · Index</title>

<body>

<header class="site-header">
  <div class="site-header-inner">
    <a href="./" class="brand">
      <span class="brand-mark">Digital Whisper</span>
      <span class="brand-sub">index · 001–184</span>
    </a>

    <label class="search-wrap" for="q">
      <kbd class="search-kbd">/</kbd>
      <input id="q" class="search-input" type="search" placeholder="חפש לפי כותרת או מחבר…" autocomplete="off">
    </label>

    <nav class="nav">
      <button id="theme-toggle" class="theme-toggle" title="החלף ערכת נושא" aria-label="Toggle theme">
        <svg class="theme-icon icon-moon" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79Z"/>
        </svg>
        <svg class="theme-icon icon-sun" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
          <circle cx="12" cy="12" r="4"/>
          <path stroke-linecap="round" d="M12 3v2M12 19v2M5 12H3M21 12h-2M5.6 5.6l1.4 1.4M17 17l1.4 1.4M5.6 18.4 7 17M17 7l1.4-1.4"/>
        </svg>
      </button>
      <a href="./" aria-current="page">כל המאמרים</a>
      <a href="by-issue.html">לפי גליון</a>
      <a href="by-author.html">לפי מחבר</a>
      <a href="dashboard.html">דשבורד</a>
      <a href="about.html">אודות</a>
    </nav>
  </div>
</header>

<main>
  <div class="index-layout">
    <aside class="sidebar">
      <button type="button" id="sidebar-toggle" class="sidebar-toggle" aria-expanded="false" aria-controls="sidebar-body">
        <span class="sidebar-toggle-label">סינון</span>
        <span class="sidebar-toggle-count" id="sidebar-toggle-count" aria-hidden="true"></span>
        <span class="sidebar-toggle-chevron" aria-hidden="true">▾</span>
      </button>
      <div id="sidebar-body" class="sidebar-body">
        <div class="side-section">
          <div class="side-header">
            <span class="side-title">שנים</span>
            <button id="years-clear" class="side-clear">reset</button>
          </div>
          <div class="year-row">
            <select id="year-from" class="year-select" aria-label="from year"></select>
            <select id="year-to" class="year-select" aria-label="to year"></select>
          </div>
        </div>

        <div class="side-section side-section-tags">
          <div class="side-header">
            <span class="side-title">תגים</span>
            <button id="tags-clear" class="side-clear">clear all</button>
          </div>
          <div id="tag-list" class="tag-list"></div>
        </div>
      </div>
    </aside>

    <section>
      <div class="status-bar">
        <div class="status-count" id="status-count">טוען…</div>
        <div class="status-active" id="status-active"></div>
      </div>

      <div id="articles" class="articles"></div>

      <div id="empty" class="empty" hidden>
        <div class="empty-glyph">∅</div>
        <div>אין מאמרים שעונים לסינון.</div>
        <button id="reset-all" class="empty-reset">איפוס כל הסינונים</button>
      </div>
    </section>
  </div>
</main>

<footer class="site-footer">
  <div class="rule">· · · · · · · · · · · · ·</div>
  <p>
    אינדקס לא רשמי של

    · מטא־דאטה בלבד · כל המאמרים נפתחים באתר המקורי
  </p>
</footer>

<script src="js/header.js?v=2" defer></script>
<script src="js/app.js?v=2" defer></script>
